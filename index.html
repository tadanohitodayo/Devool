<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devool</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --blue:#2563EB;--blue-h:#1D4ED8;--blue-l:#EFF6FF;--blue-m:#DBEAFE;--blue-b:#BFDBFE;
  --orange:#F97316;--text:#0F172A;--t2:#475569;--t3:#94A3B8;
  --border:#E2E8F0;--bg:#fff;--bg2:#F8FAFC;--bg3:#F1F5F9;
  --shadow:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HOME */
#home{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(160deg,#F0F6FF 0%,#fff 55%,#FFF7F0 100%);}
.home-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.logo-big{font-family:'Outfit',sans-serif;font-size:76px;font-weight:600;color:var(--blue);letter-spacing:-3px;line-height:1;margin-bottom:.4rem;}
.logo-big .ol{color:var(--orange);}
.logo-tag{font-size:13px;color:var(--t3);margin-bottom:2rem;letter-spacing:.4px;}
.wrap{width:100%;max-width:560px;}
.sbar{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:16px;padding:11px 16px;gap:9px;background:var(--bg);box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s;}
.sbar:focus-within{border-color:var(--blue);box-shadow:0 0 0 4px #2563eb14,var(--shadow);}
.sbar input{flex:1;border:none;outline:none;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);background:transparent;}
.sbar input::placeholder{color:var(--t3);}
.si{color:var(--t3);font-size:15px;flex-shrink:0;}
.scl{background:none;border:none;cursor:pointer;color:var(--t3);font-size:13px;padding:3px;display:none;border-radius:50%;}
.sdiv{width:1px;height:17px;background:var(--border);flex-shrink:0;}
.svo{background:none;border:none;cursor:pointer;color:var(--t3);font-size:15px;padding:5px 7px;display:flex;align-items:center;border-radius:8px;transition:color .15s,background .15s;flex-shrink:0;}
.svo:hover{color:var(--blue);background:var(--blue-l);}
.sai{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;padding:5px 7px;display:flex;align-items:center;border-radius:8px;transition:color .15s,background .15s;flex-shrink:0;}
.sai:hover{color:var(--orange);background:#FFF7F0;}
.hbtns{display:flex;justify-content:center;gap:10px;margin-top:13px;flex-wrap:wrap;}
.bmain{font-size:14px;padding:9px 22px;border-radius:12px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-weight:500;font-family:'Inter',sans-serif;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.bmain:hover{background:var(--blue-h);transform:translateY(-1px);}
.bghost{font-size:14px;padding:9px 22px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--t2);cursor:pointer;font-weight:500;font-family:'Inter',sans-serif;transition:background .15s;}
.bghost:hover{background:var(--bg2);color:var(--blue);}
.hfooter{text-align:center;font-size:11px;color:var(--t3);padding:1.5rem;}

/* AI panel home */
.aipanel{width:100%;max-width:560px;margin-top:14px;background:var(--bg);border:1.5px solid var(--blue-b);border-radius:16px;padding:16px;display:none;box-shadow:var(--shadow);}
.aipanel.show{display:block;}
.aiphdr{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.aidot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 1.5s infinite;}
.aiphdr span{font-size:12px;font-weight:500;color:var(--blue);}
.aians{font-size:14px;color:var(--t2);line-height:1.7;}
.aians.typing::after{content:'▋';animation:blink .7s infinite;color:var(--blue);}

/* RESULTS */
#results{display:none;flex-direction:column;min-height:100vh;}
#results.show{display:flex;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 22px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.96);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;gap:12px;}
.hdrl{display:flex;align-items:center;gap:14px;flex:1;min-width:0;}
.logo-sm{font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;color:var(--blue);letter-spacing:-0.5px;cursor:pointer;flex-shrink:0;}
.logo-sm .ol{color:var(--orange);}
.hsbar{display:flex;align-items:center;flex:1;max-width:520px;border:1.5px solid var(--border);border-radius:12px;padding:6px 13px;gap:7px;background:var(--bg);transition:border-color .2s;}
.hsbar:focus-within{border-color:var(--blue);}
.hsbar input{flex:1;border:none;outline:none;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:transparent;min-width:0;}
.hsbar .si{font-size:14px;}
.hsbar .svo{font-size:13px;padding:3px 6px;}
.hsbar .sdiv{height:14px;}
.hsbar .sai{font-size:13px;padding:3px 6px;}
.hdrr{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.ibtn{background:none;border:none;cursor:pointer;color:var(--t2);font-size:16px;padding:7px 8px;border-radius:8px;display:flex;align-items:center;transition:background .15s;}
.ibtn:hover{background:var(--bg3);}

/* tabs */
.tabs{display:flex;padding:0 22px;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:13px;padding:10px 15px;cursor:pointer;color:var(--t2);border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;transition:color .15s;user-select:none;}
.tab:hover{color:var(--blue);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;}
.tab i{font-size:12px;}

/* content */
.cwrap{display:flex;gap:22px;padding:16px 22px;flex:1;max-width:1080px;}
.mcol{flex:1;min-width:0;max-width:660px;}
.scol{width:290px;flex-shrink:0;}

/* AI box */
.aibox{background:linear-gradient(135deg,var(--blue-l),#F0F9FF);border:1.5px solid var(--blue-b);border-radius:16px;padding:15px;display:none;position:sticky;top:76px;}
.aibox.show{display:block;}
.aiboxhdr{display:flex;align-items:center;gap:7px;margin-bottom:11px;}
.aiboxhdr i{color:var(--blue);font-size:14px;}
.aiboxhdr span{font-size:13px;font-weight:600;color:var(--blue);}
.aiboxbody{font-size:13px;color:var(--t2);line-height:1.75;}
.aiboxbody.typing::after{content:'▋';animation:blink .7s infinite;color:var(--blue);}

/* results */
.rc{font-size:12px;color:var(--t3);margin-bottom:14px;}
.ri{margin-bottom:1.3rem;padding-bottom:1.3rem;border-bottom:1px solid var(--border);}
.ri:last-child{border-bottom:none;margin-bottom:0;}
.rbread{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.rfav{width:15px;height:15px;border-radius:3px;object-fit:contain;}
.rurl{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rtit{font-size:16px;font-weight:500;color:var(--blue);text-decoration:none;display:block;margin-bottom:4px;line-height:1.4;}
.rtit:hover{color:var(--blue-h);text-decoration:underline;}
.rsnip{font-size:13px;color:var(--t2);line-height:1.65;}

/* news */
.ni{display:flex;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.ni:last-child{border-bottom:none;}
.nth{width:88px;height:62px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.nb{flex:1;min-width:0;}
.nsr{font-size:11px;color:var(--t3);margin-bottom:2px;font-weight:500;}
.ntit{font-size:14px;font-weight:500;color:var(--text);text-decoration:none;display:block;line-height:1.45;margin-bottom:3px;}
.ntit:hover{color:var(--blue);}
.ndt{font-size:11px;color:var(--t3);}

/* images */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.icard{border-radius:11px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--bg3);transition:transform .2s,box-shadow .2s;}
.icard:hover{transform:scale(1.02);box-shadow:var(--shadow);}
.icard img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.icap{font-size:11px;padding:5px 7px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg);}

/* videos */
.vgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.vcard{border-radius:11px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--bg);transition:border-color .15s,box-shadow .15s;}
.vcard:hover{border-color:var(--blue-b);box-shadow:var(--shadow);}
.vtw{position:relative;}
.vtw img,.vph{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3);}
.vplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:rgba(37,99,235,.88);display:flex;align-items:center;justify-content:center;}
.vplay i{color:#fff;font-size:13px;margin-left:2px;}
.vinfo{padding:9px 11px;}
.vtit{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px;}
.vmeta{font-size:11px;color:var(--t3);}

/* states */
.ld{text-align:center;padding:3rem;color:var(--blue);font-size:14px;display:none;}
.ld.show{display:block;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--blue-b);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-5px;margin-right:8px;}
.eb{background:#FEF2F2;color:#B91C1C;border-radius:11px;padding:11px 15px;font-size:13px;margin-bottom:13px;display:none;border:1px solid #FECACA;line-height:1.6;}
.eb.show{display:block;}
.morewrap{text-align:center;padding:1.5rem 0;}
.bmore{font-size:13px;padding:8px 24px;border-radius:10px;border:1.5px solid var(--blue-b);background:var(--blue-l);color:var(--blue);cursor:pointer;font-weight:500;transition:background .15s;display:none;}
.bmore:hover{background:var(--blue-m);}

/* voice overlay */
.vover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.vover.show{display:flex;}
.vmod{background:var(--bg);border-radius:22px;padding:38px 46px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);max-width:300px;width:90%;}
.vcirc{width:76px;height:76px;border-radius:50%;background:var(--blue-l);border:3px solid var(--blue);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;animation:vpulse 1s ease-in-out infinite;}
.vcirc i{font-size:30px;color:var(--blue);}
.vmod h3{font-size:17px;font-weight:600;margin-bottom:5px;font-family:'Outfit',sans-serif;}
.vmod p{font-size:13px;color:var(--t2);}
.vtrans{font-size:15px;font-weight:500;color:var(--blue);margin-top:11px;min-height:22px;}
.vcncl{margin-top:18px;background:none;border:1.5px solid var(--border);color:var(--t2);font-size:13px;padding:7px 18px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;}

.footer{text-align:center;font-size:11px;color:var(--t3);padding:1.2rem;border-top:1px solid var(--border);}

@keyframes sp{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes vpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>
<body>

<!-- Voice overlay -->
<div class="vover" id="vover">
  <div class="vmod">
    <div class="vcirc"><i class="fa-solid fa-microphone"></i></div>
    <h3>聞いています…</h3><p>話しかけてください</p>
    <div class="vtrans" id="vtrans"></div>
    <button class="vcncl" onclick="stopVoice()"><i class="fa-solid fa-stop" style="margin-right:5px"></i>キャンセル</button>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <div class="home-body">
    <div class="logo-big">Devoo<span class="ol">l</span></div>
    <div class="logo-tag">Search smarter</div>
    <div class="wrap">
      <div class="sbar">
        <i class="fa-solid fa-magnifying-glass si"></i>
        <input id="hq" type="text" placeholder="なんでも検索..." autocomplete="off"/>
        <button class="scl" id="hcl"><i class="fa-solid fa-xmark"></i></button>
        <div class="sdiv"></div>
        <button class="svo" id="hvo"><i class="fa-solid fa-microphone"></i></button>
        <div class="sdiv"></div>
        <button class="sai" id="hai"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
      </div>
      <div class="hbtns">
        <button class="bmain" id="hsb"><i class="fa-solid fa-magnifying-glass" style="margin-right:6px"></i>Devool 検索</button>
        <button class="bghost" id="hlb"><i class="fa-solid fa-dice" style="margin-right:6px"></i>気分で探す</button>
      </div>
    </div>
    <div class="aipanel" id="haip">
      <div class="aiphdr"><div class="aidot"></div><span>AI アシスタント</span></div>
      <div class="aians" id="haia"></div>
    </div>
  </div>
  <div class="hfooter">© 2026 Ryo Watanabe. All rights reserved.</div>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="hdr">
    <div class="hdrl">
      <div class="logo-sm" id="lback">Devoo<span class="ol">l</span></div>
      <div class="hsbar">
        <i class="fa-solid fa-magnifying-glass si"></i>
        <input id="rq" type="text" autocomplete="off"/>
        <button class="scl" id="rcl"><i class="fa-solid fa-xmark"></i></button>
        <div class="sdiv"></div>
        <button class="svo" id="rvo"><i class="fa-solid fa-microphone"></i></button>
        <div class="sdiv"></div>
        <button class="sai" id="rai"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
      </div>
    </div>
    <div class="hdrr">
      <button class="ibtn" id="tbtn" title="ダークモード"><i class="fa-solid fa-circle-half-stroke"></i></button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-t="web"><i class="fa-solid fa-globe"></i>すべて</div>
    <div class="tab" data-t="news"><i class="fa-solid fa-newspaper"></i>ニュース</div>
    <div class="tab" data-t="images"><i class="fa-solid fa-image"></i>画像</div>
    <div class="tab" data-t="videos"><i class="fa-solid fa-video"></i>動画</div>
    <div class="tab" data-t="ai"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--orange)"></i>AI</div>
  </div>

  <div class="cwrap">
    <div class="mcol">
      <div class="eb" id="eb"></div>
      <div class="ld" id="ld"><span class="spin"></span>検索中...</div>
      <p class="rc" id="rc"></p>
      <div id="rl"></div>
      <div class="morewrap"><button class="bmore" id="mb">もっと見る</button></div>
    </div>
    <div class="scol">
      <div class="aibox" id="raib">
        <div class="aiboxhdr"><i class="fa-solid fa-wand-magic-sparkles"></i><span>AI アシスタント</span></div>
        <div class="aiboxbody" id="raibd"></div>
      </div>
    </div>
  </div>
  <div class="footer">© 2026 Ryo Watanabe. All rights reserved.</div>
</div>

<script>
let cQ='',cT='web',pg=1,rec=null,vtgt='home',dark=false;
const home=document.getElementById('home'),res=document.getElementById('results');
const hq=document.getElementById('hq'),hcl=document.getElementById('hcl');
const rq=document.getElementById('rq'),rcl=document.getElementById('rcl');
const ld=document.getElementById('ld'),eb=document.getElementById('eb');
const rc=document.getElementById('rc'),rl=document.getElementById('rl'),mb=document.getElementById('mb');

// input
hq.addEventListener('input',()=>{hcl.style.display=hq.value?'block':'none';});
hcl.addEventListener('click',()=>{hq.value='';hcl.style.display='none';hq.focus();});
rq.addEventListener('input',()=>{rcl.style.display=rq.value?'block':'none';});
rcl.addEventListener('click',()=>{rq.value='';rcl.style.display='none';rq.focus();});
hq.addEventListener('keydown',e=>{if(e.key==='Enter')go(hq.value);});
rq.addEventListener('keydown',e=>{if(e.key==='Enter')go(rq.value);});
document.getElementById('hsb').addEventListener('click',()=>go(hq.value));
document.getElementById('hlb').addEventListener('click',()=>{const q=hq.value.trim();if(q)window.open('https://www.google.com/search?btnI=1&q='+encodeURIComponent(q),'_blank');});
document.getElementById('lback').addEventListener('click',()=>{res.classList.remove('show');home.style.display='';});
mb.addEventListener('click',()=>{pg++;doSearch(cQ,cT,pg,true);});

// tabs
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');cT=t.dataset.t;pg=1;
  rl.innerHTML='';mb.style.display='none';rc.textContent='';
  if(cT==='ai'){doAITab(cQ);return;}
  doSearch(cQ,cT,1,false);
});

// dark mode
document.getElementById('tbtn').addEventListener('click',()=>{
  dark=!dark;const s=document.documentElement.style;
  s.setProperty('--bg',dark?'#0F172A':'#fff');
  s.setProperty('--bg2',dark?'#1E293B':'#F8FAFC');
  s.setProperty('--bg3',dark?'#334155':'#F1F5F9');
  s.setProperty('--text',dark?'#F1F5F9':'#0F172A');
  s.setProperty('--t2',dark?'#94A3B8':'#475569');
  s.setProperty('--t3',dark?'#64748B':'#94A3B8');
  s.setProperty('--border',dark?'#334155':'#E2E8F0');
});

// voice
document.getElementById('hvo').addEventListener('click',()=>startVoice('home'));
document.getElementById('rvo').addEventListener('click',()=>startVoice('res'));
function startVoice(tgt){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Chromeをお使いください');return;}
  vtgt=tgt;rec=new SR();rec.lang='ja-JP';rec.interimResults=true;rec.continuous=false;
  document.getElementById('vover').classList.add('show');
  document.getElementById('vtrans').textContent='';
  rec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('vtrans').textContent=t;
    if(e.results[e.results.length-1].isFinal){
      stopVoice();
      if(vtgt==='home'){hq.value=t;go(t);}else{rq.value=t;go(t);}
    }
  };
  rec.onerror=()=>stopVoice();
  rec.onend=()=>document.getElementById('vover').classList.remove('show');
  rec.start();
}
function stopVoice(){if(rec){rec.stop();rec=null;}document.getElementById('vover').classList.remove('show');}

// AI
document.getElementById('hai').addEventListener('click',()=>{const q=hq.value.trim();if(!q){hq.focus();return;}askAI(q,'home');});
document.getElementById('rai').addEventListener('click',()=>{const q=rq.value.trim()||cQ;if(!q)return;askAI(q,'res');});
async function askAI(q,ctx){
  if(ctx==='home'){
    const p=document.getElementById('haip'),a=document.getElementById('haia');
    p.classList.add('show');a.textContent='';a.classList.add('typing');
    await callAI(q,a);
  }else{
    const b=document.getElementById('raib'),bd=document.getElementById('raibd');
    b.classList.add('show');bd.textContent='';bd.classList.add('typing');
    await callAI(q,bd);
  }
}
async function callAI(q,el){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,
        system:'あなたはDevoolという検索エンジンのAIアシスタントです。日本語で簡潔に（3〜5文）答えてください。',
        messages:[{role:'user',content:q}]})
    });
    const d=await r.json();
    el.classList.remove('typing');
    el.textContent=d.content&&d.content[0]?d.content[0].text:'回答を取得できませんでした。';
  }catch(e){el.classList.remove('typing');el.textContent='接続エラーが発生しました。';}
}
function doAITab(q){
  const b=document.getElementById('raib'),bd=document.getElementById('raibd');
  b.classList.add('show');bd.textContent='';
  askAI(q,'res');rc.textContent='AIが回答を生成中...';
}

function go(q){
  q=q.trim();
  if(!q){const inp=home.style.display==='none'?rq:hq;inp.style.outline='2px solid var(--orange)';setTimeout(()=>{inp.style.outline='';},500);return;}
  cQ=q;cT='web';pg=1;rq.value=q;rcl.style.display='block';
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-t="web"]').classList.add('active');
  home.style.display='none';res.classList.add('show');
  document.getElementById('raib').classList.remove('show');
  doSearch(q,'web',1,false);
}

function doSearch(q,tab,page,append){
  eb.className='eb';ld.className='ld show';
  if(!append){rl.innerHTML='';rc.textContent='';}

  const enc=encodeURIComponent(q);
  // CORSプロキシ経由でDuckDuckGo HTML取得
  const proxy='https://api.allorigins.win/get?url=';
  let ddgUrl='';
  if(tab==='web') ddgUrl='https://html.duckduckgo.com/html/?q='+enc;
  else if(tab==='news') ddgUrl='https://html.duckduckgo.com/html/?q='+enc+'&iar=news&ia=news';
  else if(tab==='videos') ddgUrl='https://html.duckduckgo.com/html/?q='+enc+'&iax=videos&ia=videos';
  else { ld.className='ld'; showExternal(q,tab); return; }

  fetch(proxy+encodeURIComponent(ddgUrl))
    .then(r=>r.json())
    .then(d=>{
      ld.className='ld';
      const parser=new DOMParser();
      const doc=parser.parseFromString(d.contents,'text/html');
      const results=doc.querySelectorAll('.result');
      if(!results.length){ showNoResult(q,tab); return; }
      const items=[];
      results.forEach(r=>{
        const titleEl=r.querySelector('.result__title a, .result__a');
        const snippetEl=r.querySelector('.result__snippet');
        const urlEl=r.querySelector('.result__url');
        if(!titleEl) return;
        const href=titleEl.getAttribute('href')||'';
        // DuckDuckGoのリダイレクトURLから実URLを抽出
        let realUrl=href;
        try{
          const u=new URL('https://duckduckgo.com'+href);
          realUrl=u.searchParams.get('uddg')||u.searchParams.get('u')||href;
        }catch(e){}
        items.push({
          url: realUrl,
          title: titleEl.textContent.trim(),
          snippet: snippetEl?snippetEl.textContent.trim():'',
          displayUrl: urlEl?urlEl.textContent.trim():host(realUrl)
        });
      });
      if(!items.length){ showNoResult(q,tab); return; }
      rc.textContent=items.length+'件以上の結果';
      renderDDG(items);
      mb.style.display='none';
    })
    .catch(()=>{ ld.className='ld'; showNoResult(q,tab); });
}

function renderDDG(items){
  items.forEach(it=>{
    const d=document.createElement('div');d.className='ri';
    const h=it.displayUrl||host(it.url);
    d.innerHTML='<div class="rbread"><img class="rfav" src="https://icons.duckduckgo.com/ip3/'+host(it.url)+'.ico" alt="" onerror="this.style.display=\'none\'" style="width:15px;height:15px;border-radius:3px;"><span class="rurl">'+h+'</span></div>'
      +'<a class="rtit" href="'+it.url+'" target="_blank" rel="noopener">'+it.title+'</a>'
      +'<div class="rsnip">'+it.snippet+'</div>';
    rl.appendChild(d);
  });
}

function showNoResult(q,tab){
  rl.innerHTML='';rc.textContent='';
  const div=document.createElement('div');
  div.style.cssText='text-align:center;padding:2.5rem 1rem;';
  div.innerHTML='<p style="color:var(--t2);font-size:14px;margin-bottom:16px;">「<strong>'+q+'</strong>」の結果が見つかりませんでした。</p>';
  rl.appendChild(div);
}

function showExternal(q,tab){
  rl.innerHTML='';rc.textContent='';
  const gUrl=tab==='images'?'https://duckduckgo.com/?q='+encodeURIComponent(q)+'&ia=images&iax=images':'https://duckduckgo.com/?q='+encodeURIComponent(q);
  const label=tab==='images'?'画像':'動画';
  const div=document.createElement('div');
  div.style.cssText='text-align:center;padding:2.5rem 1rem;';
  div.innerHTML='<p style="color:var(--t2);font-size:14px;margin-bottom:16px;">「<strong>'+q+'</strong>」の'+label+'を検索</p>'
    +'<a href="'+gUrl+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;padding:10px 22px;border-radius:12px;text-decoration:none;font-size:14px;font-weight:500;">DuckDuckGoで見る <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:12px"></i></a>';
  rl.appendChild(div);
}

function renderWeb(items,tab){
  items.forEach(it=>{
    if(tab==='news'){renderNews(it);return;}
    const d=document.createElement('div');d.className='ri';
    const h=host(it.url);
    d.innerHTML='<div class="rbread"><img class="rfav" src="https://www.google.com/s2/favicons?sz=16&domain='+h+'" alt="" onerror="this.style.display=\'none\'"><span class="rurl">'+h+'</span></div>'
      +'<a class="rtit" href="'+it.url+'" target="_blank" rel="noopener">'+(it.title||it.url)+'</a>'
      +'<div class="rsnip">'+(it.content||'')+'</div>';
    rl.appendChild(d);
  });
}
function renderNews(it){
  const d=document.createElement('div');d.className='ni';
  const th=it.thumbnail||it.img_src||'';
  d.innerHTML=(th?'<img class="nth" src="'+th+'" alt="" onerror="this.style.display=\'none\'">':'<div class="nth"></div>')
    +'<div class="nb"><div class="nsr">'+host(it.url)+'</div>'
    +'<a class="ntit" href="'+it.url+'" target="_blank" rel="noopener">'+(it.title||'')+'</a>'
    +'<div class="ndt">'+(it.publishedDate||(it.content||'').substring(0,40))+'</div></div>';
  rl.appendChild(d);
}
function renderImg(items,append){
  let g=append?rl.querySelector('.igrid'):null;
  if(!g){g=document.createElement('div');g.className='igrid';rl.appendChild(g);}
  items.forEach(it=>{
    const src=it.thumbnail_src||it.img_src||it.url;if(!src)return;
    const c=document.createElement('div');c.className='icard';
    c.innerHTML='<img src="'+src+'" alt="'+(it.title||'')+'" loading="lazy" onerror="this.closest(\'.icard\').style.display=\'none\'">'
      +'<div class="icap">'+(it.title||'')+'</div>';
    c.onclick=()=>window.open(it.url||src,'_blank');
    g.appendChild(c);
  });
}
function renderVid(items,append){
  let g=append?rl.querySelector('.vgrid'):null;
  if(!g){g=document.createElement('div');g.className='vgrid';rl.appendChild(g);}
  items.forEach(it=>{
    const c=document.createElement('div');c.className='vcard';
    const th=it.thumbnail||it.img_src||'';
    c.innerHTML='<div class="vtw">'+(th?'<img src="'+th+'" alt="" style="width:100%;aspect-ratio:16/9;object-fit:cover;display:block;" onerror="this.classList.add(\'vph\')">':'<div class="vph"></div>')
      +'<div class="vplay"><i class="fa-solid fa-play"></i></div></div>'
      +'<div class="vinfo"><div class="vtit">'+(it.title||'')+'</div><div class="vmeta">'+host(it.url)+'</div></div>';
    c.onclick=()=>window.open(it.url,'_blank');
    g.appendChild(c);
  });
}

function host(u){try{return new URL(u).hostname;}catch(e){return u;}}
function showErr(m){eb.innerHTML=m;eb.className='eb show';}
</script>
